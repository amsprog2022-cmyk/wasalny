{% extends "layout/base.html" %}
{% block title %}منطقة جديدة · وصلني بنها{% endblock %}
{% block content %}
<div class="p-6 max-w-lg mx-auto">
  <h1 class="text-2xl font-bold mb-6">منطقة جديدة</h1>

  <form method="post" class="card space-y-4">
    <div>
      <label class="block text-sm mb-1 text-white/80">الاسم بالعربي</label>
      <input name="name_ar" class="input" placeholder="مثال: الرملة" required />
    </div>

    <div>
      <label class="block text-sm mb-1 text-white/80">الاسم بالإنجليزي</label>
      <input name="name_en" class="input" placeholder="e.g. El Ramla" dir="ltr" required />
    </div>

    <div>
      <label class="block text-sm mb-1 text-white/80">Slug (اختياري)</label>
      <input name="slug" class="input" placeholder="بيتعمل تلقائي" dir="ltr" />
      <p class="text-xs text-text-muted mt-1">للنظام الداخلي.</p>
    </div>

    <div class="flex gap-3 pt-2">
      <button type="submit" class="btn-primary">ضيف المنطقة</button>
      <a href="{{ url_for('zones.index') }}" class="btn-ghost">إلغاء</a>
    </div>
  </form>
</div>
{% endblock %}
