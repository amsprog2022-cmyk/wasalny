{% extends "layout/base.html" %}
{% block title %}تسجيل دخول · وصلني بنها{% endblock %}
{% block content %}
<div class="h-full flex items-center justify-center bg-bg">
  <form method="post" class="card w-full max-w-sm" style="padding: 32px;">
    <h1 class="text-2xl font-bold text-center mb-2 text-primary">🚗 وصلني بنها</h1>
    <p class="text-center text-text-muted text-sm mb-6">دخول الفريق</p>

    <label class="block text-sm mb-1 text-white/80">الإيميل</label>
    <input name="email" type="email" required class="input mb-4" />

    <label class="block text-sm mb-1 text-white/80">كلمة السر</label>
    <input name="password" type="password" required class="input mb-6" />

    <button type="submit" class="btn-primary w-full">دخول</button>
  </form>
</div>
{% endblock %}
